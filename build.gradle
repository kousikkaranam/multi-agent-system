plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.4'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.agent'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Core
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-webflux'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // LangChain4j — LLM abstraction layer (Ollama, OpenAI, Gemini, etc.)
    implementation 'dev.langchain4j:langchain4j:1.12.2'
    implementation 'dev.langchain4j:langchain4j-ollama:1.12.2'

    // Google ADK — Agent orchestration framework
    implementation 'com.google.adk:google-adk:0.9.0'
    implementation 'com.google.adk:google-adk-contrib-langchain4j:0.2.0'

    // JSON
    implementation 'com.fasterxml.jackson.core:jackson-databind'

    // Lombok (1.18.44 for Java 25 compatibility)
    compileOnly 'org.projectlombok:lombok:1.18.44'
    annotationProcessor 'org.projectlombok:lombok:1.18.44'

    // Test
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}
