server:
  port: 8000

ollama:
  base-url: http://localhost:11434
  model: qwen2.5-coder:14b
  max-tokens: 2048
  temperature: 0.7

spring:
  application:
    name: multi-agent-system

# Web search configuration (all optional — Bing RSS works with no keys)
#
# Option 1: Tavily (best) — https://tavily.com — 1000 free/month
tavily:
  api-key: ${TAVILY_API_KEY:}
#
# Option 2: Google Custom Search — 100 free/day
#   1. Get API key: https://console.cloud.google.com/apis/credentials
#   2. Create search engine: https://programmablesearchengine.google.com
google:
  search:
    api-key: ${GOOGLE_SEARCH_API_KEY:}
    cx: ${GOOGLE_SEARCH_CX:}
#
# Option 3: No keys needed — Bing RSS (default fallback, always works)
