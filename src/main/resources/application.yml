server:
  port: 8000

ollama:
  base-url: http://localhost:11434
  model: qwen2.5-coder:14b
  max-tokens: 2048
  temperature: 0.7

spring:
  application:
    name: multi-agent-system

# ─── Web Search (all optional — Bing RSS works with ZERO keys) ───
# Set any key to enable that engine. Fallback: Serper → Brave → Tavily → SerpAPI → Google → Bing RSS
search:
  serper-api-key: ${SERPER_API_KEY:}       # https://serper.dev — 2500 free queries
  brave-api-key: ${BRAVE_API_KEY:}         # https://brave.com/search/api — 2000 free/month
  serpapi-key: ${SERPAPI_KEY:}              # https://serpapi.com — 100 free/month (DuckDuckGo engine)
tavily:
  api-key: ${TAVILY_API_KEY:}              # https://tavily.com — 1000 free/month
google:
  search:
    api-key: ${GOOGLE_SEARCH_API_KEY:}     # https://console.cloud.google.com — 100 free/day
    cx: ${GOOGLE_SEARCH_CX:}              # https://programmablesearchengine.google.com
